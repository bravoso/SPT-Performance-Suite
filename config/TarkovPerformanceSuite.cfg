## Tarkov Performance Suite 1.0.1 combat-safety defaults
## Extreme is the strongest general-purpose profile. Diagnostics and HUD are opt-in.

[Quick Setup]
PerformancePreset = Extreme
AllOptimizationsEnabled = true
AllOptimizationsToggleKey = Keypad4

[General]
Enabled = true
VerboseLogging = false

[Diagnostics]
OverlayEnabled = false
OverlayMode = Compact
OverlayKey = Keypad7
CaptureKey = Keypad8
ContinuousCapture = false
DiagnosticReportKey = Keypad9
CaptureDurationSeconds = 120
ExportCsv = true
ExportJson = false
MethodTimingEnabled = false
MethodTimingCaptureOnly = true

[HUD - Bot Counter]
Enabled = false
RefreshRateHz = 2
FontSize = 16
FontName =
FontStyle = Bold
ShowBossNames = true
OnlyShowSpawnedCategories = true
OffsetRight = 20
OffsetTop = 40

[Experiments]
RemoteCharacterShadowsEnabled = true
RemoteCharacterShadowDistance = 35
RemoteCharacterShadowUpdateIntervalSeconds = 0.25
RemoteCharacterShadowToggleKey = Keypad6
RemoteCharacterShadowsAdaptive = true
RemoteCharacterShadowMinimumDistance = 20
RemoteCharacterShadowTargetFps = 60
RemoteAiOffscreenSkinningEnabled = true
RemoteAiOffscreenSkinningDistance = 80
RemoteAiOffscreenSkinningUpdateIntervalSeconds = 0.1
RemoteAiOffscreenSkinningHoldSeconds = 0.5
RemoteAiOffscreenSkinningToggleKey = Keypad5

[Aggressive]
Enabled = true
TextureMipLimit = 0
ShadowDistance = 28
ShadowResolution = Low
ShadowCascades = 2
PixelLightCount = 0
ParticleRaycastBudget = 8
AmbientReflectionRefreshHz = 10
AmbientCommandRefreshRateHz = 12
CacheStaticAreaLightCommands = true
AreaLightRefreshFrames = 8
WorldPresentationRateBudget = true
CullingRefreshRateHz = 30
DistantShadowRefreshRateHz = 15
DeferredDecalRefreshRateHz = 15
WeatherRefreshRateHz = 10
CosmeticDeclutterEnabled = true
CosmeticDeclutterBatchSize = 200

[CPU - Remote Characters]
Enabled = false
MinimumDistance = 20
HiddenHoldSeconds = 0.05
ScanIntervalSeconds = 0.075
HiddenUpdateDivisor = 8
CullHiddenAnimators = false
BudgetHiddenArmsBodyAndIK = false
BudgetHiddenComplexLateUpdate = false
AggressivePresentationDistance = 50
VisibleDistantUpdateDivisor = 2
FreezeHiddenDistantPresentation = false

[CPU - Threading]
UseAllLogicalProcessors = true

[CPU - Frame Pacing]
Enabled = true
LowPriorityBackgroundLoading = true
AsyncUploadTimeSliceMs = 2
AsyncUploadBufferMB = 32
PersistentUploadBuffer = true
ReusePhysicsCollisionCallbacks = true

[CPU - Combat Presentation]
Enabled = true
SoundOnlyRemoteShotsOnFikaClients = false
SoundOnlyDistance = 90
IncomingFireSafetyRadius = 40
RecentlyVisibleHoldSeconds = 0.35
RequireBakedMapOcclusion = true
CullHiddenMuzzleEffects = true
MuzzleEffectDistance = 40
CullOffscreenImpactEffects = true
ImpactEffectDistance = 60
CullHiddenRemoteLights = true
RemoteLightDistance = 45
CullDistantCasingPhysics = true
CasingPhysicsDistance = 18
BudgetBulletFlybyScans = true
BulletFlybyScanRate = 20

[CPU - PiP Scopes]
Enabled = true
ReplacePiPWithMainCameraZoom = true
ReplacementToggleKey = Keypad3
ResolutionScale = 1
LeaveThermalAndNightVisionUnchanged = true
DisableMSAA = true

[Headless Authority]
Enabled = false
BotSnapshotRate = 20
OrbitNavJobsPerFrame = 3

[Compatibility]
FixKnownPeriodicScans = true
SuppressKnownCombatInfoLogs = true

[Compatibility - Dynamic Maps]
Enabled = true
OnlyPlayerQuestPartyAndKilledBodies = true
MiniMapRefreshRateHz = 24
