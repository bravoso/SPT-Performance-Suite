## Friend-ready profile for Tarkov Performance Suite 0.8.0
## Put this file at BepInEx\config\com.lucaswilluweit.tarkovperformancesuite.cfg

[Quick Setup]
PerformancePreset = OldCpuAggressive
AllOptimizationsEnabled = true
AllOptimizationsToggleKey = Keypad4

[General]
Enabled = true
VerboseLogging = false

[Diagnostics]
OverlayEnabled = true
OverlayMode = Compact
OverlayKey = Keypad7
CaptureKey = Keypad8
ContinuousCapture = false
DiagnosticReportKey = Keypad9
CaptureDurationSeconds = 120
ExportCsv = true
MethodTimingEnabled = true
MethodTimingCaptureOnly = true

[Compatibility]
FixKnownPeriodicScans = true
SuppressKnownCombatInfoLogs = true

[CPU - Remote Characters]
BudgetHiddenArmsBodyAndIK = true
BudgetHiddenComplexLateUpdate = true

[CPU - Threading]
UseAllLogicalProcessors = true

[CPU - Combat Presentation]
Enabled = true
CullDistantCasingPhysics = true
CasingPhysicsDistance = 25
BudgetBulletFlybyScans = true
BulletFlybyScanRate = 30

[CPU - PiP Scopes]
Enabled = true
ResolutionScale = 0.5
LeaveThermalAndNightVisionUnchanged = true
DisableMSAA = true
