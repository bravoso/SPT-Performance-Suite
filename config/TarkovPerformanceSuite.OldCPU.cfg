## Friend-ready profile for Tarkov Performance Suite 0.4.0
## Put this file at BepInEx\config\com.lucaswilluweit.tarkovperformancesuite.cfg

[Quick Setup]
PerformancePreset = OldCpuAggressive

[General]
Enabled = true
VerboseLogging = false

[Diagnostics]
OverlayEnabled = true
OverlayMode = Compact
OverlayKey = Keypad7
CaptureKey = Keypad8
DiagnosticReportKey = Keypad9
CaptureDurationSeconds = 120
ExportCsv = true
MethodTimingEnabled = false
MethodTimingCaptureOnly = true

[Compatibility]
FixKnownPeriodicScans = true
